apiVersion: v1
kind: Namespace
metadata:
  name: tictactoe-game
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: game-config
  namespace: tictactoe-game
data:
  REDIS_HOST: "redis-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: game-secret
  namespace: tictactoe-game
type: Opaque
data:
  # "supersecretpass" in base64 format
  REDIS_PASSWORD: c3VwZXJzZWNyZXRwYXNz

