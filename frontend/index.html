<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K8s Tic-Tac-Toe</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; font-size: 24px; font-weight: bold; line-height: 100px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Kubernetes Tic-Tac-Toe</h1>
    <div id="status">Player X's Turn</div>
    <div class="grid" id="board"></div>
    <button onclick="resetGame()">Reset Match</button>

    <script>
        let board = Array(9).fill("");
        let currentPlayer = "X";
        const boardElement = document.getElementById("board");
        const statusElement = document.getElementById("status");

        function createBoard() {
            boardElement.innerHTML = "";
            board.forEach((cell, index) => {
                const cellElement = document.createElement("div");
                cellElement.classList.add("cell");
                cellElement.innerText = cell;
                cellElement.addEventListener("click", () => makeMove(index));
                boardElement.appendChild(cellElement);
            });
        }

        function makeMove(index) {
            if (board[index] === "") {
                board[index] = currentPlayer;
                createBoard();
                checkWinner();
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                if (statusElement.innerText.includes("Turn")) {
                    statusElement.innerText = `Player ${currentPlayer}'s Turn`;
                }
            }
        }

        function checkWinner() {
            // Send game state to backend to verify winner and log score
            fetch('/api/check-game', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: board })
            })
            .then(res => res.json())
            .then(data => {
                if (data.winner) {
                    statusElement.innerText = data.winner === "Draw" ? "It's a Draw!" : `Player ${data.winner} Wins!`;
                }
            });
        }

        function resetGame() {
            board = Array(9).fill("");
            currentPlayer = "X";
            statusElement.innerText = "Player X's Turn";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
