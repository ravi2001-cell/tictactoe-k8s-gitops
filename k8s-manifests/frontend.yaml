apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictactoe-frontend
  namespace: tictactoe-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-frontend
  template:
    metadata:
      labels:
        app: game-frontend
    spec:
      containers:
      - name: frontend-container
        image: rkdocker1800/tictac:fe
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tictactoe-game
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: game-frontend

